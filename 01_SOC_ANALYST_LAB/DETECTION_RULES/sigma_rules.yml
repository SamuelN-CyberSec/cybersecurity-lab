# Sigma Detection Rules — SOC Lab
# Convert to Wazuh/Elasticsearch format as needed

title: Suspicious PowerShell Download
id: 100001
status: experimental
description: Detects PowerShell downloading remote scripts
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\powershell.exe'
    CommandLine|contains:
      - 'Invoke-WebRequest'
      - 'Net.WebClient'
      - 'DownloadString'
      - 'DownloadFile'
  condition: selection
falsepositives:
  - Administrative scripts
  - Software updates
level: high
tags:
  - attack.execution
  - attack.t1059.001
---
title: Windows Defender Disabled
id: 100002
status: experimental
description: Detects when Windows Defender real-time monitoring is disabled
logsource:
  category: registry_event
  product: windows
detection:
  selection:
    EventID: 4657
    ObjectName|contains: 'DisableRealtimeMonitoring'
    NewValue: 'dword:00000001'
  condition: selection
falsepositives:
  - Administrative maintenance
level: critical
tags:
  - attack.defense_evasion
  - attack.t1562.001
---
title: Pass-the-Hash Detection
id: 100003
status: experimental
description: Detects potential pass-the-hash attacks via event log anomalies
logsource:
  category: security
  product: windows
detection:
  selection:
    EventID:
      - 4624  # Logon
      - 4672  # Admin logon
    LogonType: 9  # NewCredentials
    LogonProcess: 'seclogo'
  condition: selection
falsepositives:
  - Legitimate credential caching
level: high
tags:
  - attack.credential_access
  - attack.t1550.002
---
title: Suspicious Scheduled Task Creation
id: 100004
status: experimental
description: Detects creation of scheduled tasks by non-system accounts
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\schtasks.exe'
    CommandLine|contains:
      - '/create'
      - 'SYSTEM'
      - 'runas'
  filter:
    User|contains: 'SYSTEM'
  condition: selection and not filter
falsepositives:
  - Legitimate IT admin tasks
level: medium
tags:
  - attack.execution
  - attack.t1053.005
---
title: Suspicious Service Installation
id: 100005
status: experimental
description: Detects installation of unknown services
logsource:
  category: system
  product: windows
detection:
  selection:
    EventID: 7045
    ServiceType:
      - 'kernel mode driver'
      - 'own process'
    ImagePath|contains:
      - 'powershell'
      - 'cmd.exe'
      - 'temp'
  condition: selection
falsepositives:
  - Legitimate software installation
level: high
tags:
  - attack.persistence
  - attack.t1543.003
